<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Pathfinding Visualizer</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260322a" />
    <link rel="stylesheet" href="/static/css/visualize.css?v=20260322a" />
    <link rel="stylesheet" href="/static/css/race.css?v=20260322a" />
  </head>
  <body>
    <header class="header">
      <!-- Tab Bar -->
      <nav class="tab-bar">
        <button class="tab active" data-tab="visualize">Visualize</button>
        <button class="tab" data-tab="race">Race</button>
      </nav>

      <!-- ── Visualize Ribbon ──────────────────────────────── -->
      <div class="ribbon" id="ribbon-viz">
        <!-- Speed + Algorithm -->
        <div class="rib-group rib-group-stack">
          <div class="rib-stack">
            <div class="stack-unit stack-unit-speed">
              <div class="rib-body col rib-speed-body">
                <div class="speed-header">
                  Speed &mdash; <span id="speed-val">18</span>
                </div>
                <div class="speed-row">
                  <button class="btn btn-icon" id="btn-spd-down">
                    &minus;
                  </button>
                  <input
                    type="range"
                    class="speed-slider"
                    id="speed-slider"
                    min="1"
                    max="999"
                    value="20"
                  />
                  <button class="btn btn-icon" id="btn-spd-up">+</button>
                </div>
              </div>
            </div>

            <div class="stack-unit stack-unit-algo">
              <div class="rib-body">
                <div class="dropdown" id="algo-dd">
                  <button class="dd-btn" id="algo-btn">
                    <span id="algo-name"></span>
                    <span class="dd-arrow">&#9662;</span>
                  </button>
                  <div class="dd-list hidden" id="algo-list"></div>
                </div>
              </div>
              <div class="rib-label">Algorithm</div>
            </div>
          </div>
        </div>
        <div class="rib-sep"></div>

        <!-- Run / Step -->
        <div class="rib-group rib-group-run">
          <div class="rib-body col" style="align-items: center; gap: 4px">
            <div class="step-row">
              <button
                class="btn btn-icon btn-step-nav"
                id="btn-step-back"
                title="Step Back [,]"
                disabled
              >
                &#9664;
              </button>
              <button class="btn btn-run" id="btn-run">Run</button>
              <button
                class="btn btn-icon btn-step-nav"
                id="btn-step-fwd"
                title="Step Forward [.]"
                disabled
              >
                &#9654;
              </button>
            </div>
            <button class="btn btn-sm btn-cancel hidden" id="btn-cancel">
              &#9724; Cancel
            </button>
          </div>
          <div class="rib-label">Run</div>
        </div>
        <div class="rib-sep"></div>

        <!-- Edit -->
        <div class="rib-group rib-group-edit">
          <div class="rib-body edit-grid">
            <button class="btn btn-sm" id="btn-maze">Basic Maze</button>
            <button class="btn btn-sm" id="btn-clear">Clear Path</button>
            <button class="btn btn-sm" id="btn-weighted-maze">
              Weighted Maze
            </button>
            <button class="btn btn-sm btn-danger" id="btn-reset">
              Reset All
            </button>
          </div>
          <div class="rib-label">Edit</div>
        </div>
        <div class="rib-sep"></div>

        <!-- Grid -->
        <div class="rib-group rib-group-grid">
          <div class="rib-body col">
            <div class="grid-row">
              <span class="grid-lbl">Rows</span>
              <button class="btn btn-icon" id="btn-row-dn">&minus;</button>
              <input
                class="grid-input"
                id="inp-rows"
                value="30"
                maxlength="3"
              />
              <button class="btn btn-icon" id="btn-row-up">+</button>
            </div>
            <div class="grid-row">
              <span class="grid-lbl">Cols</span>
              <button class="btn btn-icon" id="btn-col-dn">&minus;</button>
              <input
                class="grid-input"
                id="inp-cols"
                value="40"
                maxlength="3"
              />
              <button class="btn btn-icon" id="btn-col-up">+</button>
            </div>
          </div>
          <div class="rib-label">Grid</div>
        </div>
      </div>

      <!-- ── Race Ribbon ───────────────────────────────────── -->
      <div class="ribbon hidden" id="ribbon-race">
        <div class="rib-group rib-wide">
          <div class="rib-body row" id="race-algos"></div>
          <div class="rib-label">Algorithms</div>
        </div>
        <div class="rib-sep"></div>
        <div class="rib-group">
          <div class="rib-body col" style="align-items: center; gap: 4px">
            <div class="step-row">
              <button
                class="btn btn-icon btn-step-nav"
                id="race-btn-step-back"
                title="Step Back"
                disabled
              >
                &#9664;
              </button>
              <button class="btn btn-run" id="btn-race" disabled>Race</button>
              <button
                class="btn btn-icon btn-step-nav"
                id="race-btn-step-fwd"
                title="Step Forward"
                disabled
              >
                &#9654;
              </button>
            </div>
            <button class="btn btn-sm btn-cancel hidden" id="race-btn-cancel">
              &#9724; Cancel
            </button>
          </div>
          <div class="rib-label">Race</div>
        </div>
        <div class="rib-sep"></div>
        <div class="rib-group">
          <div class="rib-body col" style="min-width: 190px">
            <div class="speed-header">
              Speed &mdash; <span id="race-speed-val">20</span>
            </div>
            <div class="speed-row">
              <button class="btn btn-icon" id="race-btn-spd-dn">&minus;</button>
              <input
                type="range"
                class="speed-slider"
                id="race-speed-slider"
                min="1"
                max="999"
                value="20"
              />
              <button class="btn btn-icon" id="race-btn-spd-up">+</button>
            </div>
          </div>
          <div class="rib-label">Speed</div>
        </div>
      </div>
    </header>

    <!-- ── Main content ─────────────────────────────────────── -->
    <main class="main">
      <!-- Visualize -->
      <div class="content" id="content-viz">
        <div class="viz-workspace">
          <div class="grid-area" id="grid-area">
            <canvas id="grid-canvas"></canvas>
          </div>
        </div>
        <aside class="viz-sidebar" id="viz-sidebar">
          <section class="side-panel side-panel-stats">
            <div class="side-title">Statistics</div>
            <div class="stats-grid">
              <div class="stat">
                <div class="stat-lbl">Nodes</div>
                <div class="stat-val" id="st-nodes">0</div>
              </div>
              <div class="stat">
                <div class="stat-lbl">Path</div>
                <div class="stat-val" id="st-path">0</div>
              </div>
              <div class="stat">
                <div class="stat-lbl">Cost</div>
                <div class="stat-val" id="st-cost">0</div>
              </div>
              <div class="stat">
                <div class="stat-lbl">Time</div>
                <div class="stat-val" id="st-time">0.0 ms</div>
              </div>
            </div>
            <div class="stat-status" id="st-status"></div>
          </section>

          <section class="side-panel side-panel-options">
            <div class="side-title">Options</div>
            <div class="options-col">
              <button class="btn btn-sm btn-cp-toggle" id="btn-cp-toggle">
                <span class="cp-icon"></span
                ><span id="cp-label">Checkpoint</span>
              </button>
              <div class="terrain-row">
                <button
                  class="btn btn-sm btn-terrain"
                  id="btn-t-grass"
                  data-terrain="10"
                  title="Grass — cost ×2"
                >
                  <span class="t-dot" style="background: #8bc34a"></span>Grass
                  ×2
                </button>
                <button
                  class="btn btn-sm btn-terrain"
                  id="btn-t-swamp"
                  data-terrain="9"
                  title="Swamp — cost ×5"
                >
                  <span class="t-dot" style="background: #8b5e3c"></span>Swamp
                  ×5
                </button>
                <button
                  class="btn btn-sm btn-terrain"
                  id="btn-t-water"
                  data-terrain="8"
                  title="Water — cost ×10"
                >
                  <span class="t-dot" style="background: #1b6ca8"></span>Water
                  ×10
                </button>
              </div>
            </div>
          </section>

          <section class="side-panel side-panel-legend">
            <div class="side-title">Legend</div>
            <div class="grid-legend">
              <div class="gl-item">
                <span class="gl-dot" style="background: #34c759"></span>Start
              </div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #ff3b30"></span>End
              </div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #ffd60a"></span
                >Checkpoint
              </div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #1c1c1e"></span>Wall
              </div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #007aff"></span>Visited
              </div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #5856d6"></span>Frontier
              </div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #ff9500"></span>Path
              </div>
              <div class="gl-sep"></div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #8bc34a"></span>Grass ×2
              </div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #8b5e3c"></span>Swamp ×5
              </div>
              <div class="gl-item">
                <span class="gl-dot" style="background: #1b6ca8"></span>Water
                ×10
              </div>
            </div>
          </section>
        </aside>
      </div>

      <!-- Race -->
      <div class="content hidden" id="content-race">
        <div class="race-panels" id="race-panels"></div>
        <div class="race-charts hidden" id="race-charts">
          <div id="race-comparison-table"></div>
          <canvas class="chart" id="chart-nodes"></canvas>
          <canvas class="chart" id="chart-path"></canvas>
          <canvas class="chart" id="chart-cost"></canvas>
          <canvas class="chart" id="chart-time"></canvas>
          <canvas class="chart" id="chart-iterations"></canvas>
          <canvas class="chart" id="chart-memory"></canvas>
          <canvas class="chart chart-radar" id="chart-radar"></canvas>
        </div>
      </div>
    </main>

    <script>
      const ALG_NAMES = {{ algo_names | tojson }};
    </script>
    <script src="/static/js/app.js?v=20260322a"></script>
    <script src="/static/js/visualize.js?v=20260322a"></script>
    <script src="/static/js/race.js?v=20260322a"></script>
  </body>
</html>
