<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Pathfinding Visualizer</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="header">
    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab active" data-tab="visualize">Visualize</button>
      <button class="tab" data-tab="race">Race</button>
    </nav>

    <!-- ── Visualize Ribbon ──────────────────────────────── -->
    <div class="ribbon" id="ribbon-viz">
      <!-- Algorithm -->
      <div class="rib-group">
        <div class="rib-body">
          <div class="dropdown" id="algo-dd">
            <button class="dd-btn" id="algo-btn">
              <span id="algo-name"></span>
              <span class="dd-arrow">&#9662;</span>
            </button>
            <div class="dd-list hidden" id="algo-list"></div>
          </div>
          <div class="algo-full" id="algo-full"></div>
        </div>
        <div class="rib-label">Algorithm</div>
      </div>
      <div class="rib-sep"></div>

      <!-- Run -->
      <div class="rib-group">
        <div class="rib-body center">
          <button class="btn btn-run" id="btn-run">Run</button>
        </div>
        <div class="rib-label">Run</div>
      </div>
      <div class="rib-sep"></div>

      <!-- Edit -->
      <div class="rib-group">
        <div class="rib-body col">
          <button class="btn btn-sm" id="btn-clear">Clear Path</button>
          <button class="btn btn-sm" id="btn-maze">Generate Maze</button>
          <button class="btn btn-sm btn-danger" id="btn-reset">Reset All</button>
        </div>
        <div class="rib-label">Edit</div>
      </div>
      <div class="rib-sep"></div>

      <!-- Speed -->
      <div class="rib-group">
        <div class="rib-body col" style="min-width:190px">
          <div class="speed-header">Speed &mdash; <span id="speed-val">20</span></div>
          <div class="speed-row">
            <button class="btn btn-icon" id="btn-spd-down">&minus;</button>
            <input type="range" class="speed-slider" id="speed-slider"
                   min="1" max="200" value="20">
            <button class="btn btn-icon" id="btn-spd-up">+</button>
          </div>
        </div>
        <div class="rib-label">Speed</div>
      </div>
      <div class="rib-sep"></div>

      <!-- Grid -->
      <div class="rib-group">
        <div class="rib-body col">
          <div class="grid-row">
            <span class="grid-lbl">Rows</span>
            <button class="btn btn-icon" id="btn-row-dn">&minus;</button>
            <input class="grid-input" id="inp-rows" value="28" maxlength="3">
            <button class="btn btn-icon" id="btn-row-up">+</button>
          </div>
          <div class="grid-row">
            <span class="grid-lbl">Cols</span>
            <button class="btn btn-icon" id="btn-col-dn">&minus;</button>
            <input class="grid-input" id="inp-cols" value="40" maxlength="3">
            <button class="btn btn-icon" id="btn-col-up">+</button>
          </div>
        </div>
        <div class="rib-label">Grid</div>
      </div>
      <div class="rib-sep"></div>

      <!-- Points -->
      <div class="rib-group">
        <div class="rib-body col">
          <button class="btn btn-sm" id="btn-ss">Set Start [S]</button>
          <button class="btn btn-sm" id="btn-se">Set End [E]</button>
        </div>
        <div class="rib-label">Points</div>
      </div>
      <div class="rib-sep"></div>

      <!-- Statistics -->
      <div class="rib-group rib-stats">
        <div class="rib-body">
          <div class="stats-grid">
            <div class="stat">
              <div class="stat-lbl">Nodes</div>
              <div class="stat-val" id="st-nodes">0</div>
            </div>
            <div class="stat">
              <div class="stat-lbl">Path</div>
              <div class="stat-val" id="st-path">0</div>
            </div>
            <div class="stat">
              <div class="stat-lbl">Cost</div>
              <div class="stat-val" id="st-cost">0</div>
            </div>
            <div class="stat">
              <div class="stat-lbl">Time</div>
              <div class="stat-val" id="st-time">0.0 ms</div>
            </div>
          </div>
          <div class="stat-status" id="st-status"></div>
        </div>
        <div class="rib-label">Statistics</div>
      </div>

      <!-- Show Tree (far right) -->
      <div class="rib-group rib-right">
        <div class="rib-body center">
          <button class="btn btn-accent hidden" id="btn-tree">Show Tree</button>
        </div>
      </div>
    </div>

    <!-- ── Race Ribbon ───────────────────────────────────── -->
    <div class="ribbon hidden" id="ribbon-race">
      <div class="rib-group rib-wide">
        <div class="rib-body row" id="race-algos"></div>
        <div class="rib-label">Algorithms</div>
      </div>
      <div class="rib-sep"></div>
      <div class="rib-group">
        <div class="rib-body center">
          <button class="btn btn-race" id="btn-race" disabled>Select 2+ algos</button>
        </div>
        <div class="rib-label">Race</div>
      </div>
    </div>
  </header>

  <!-- ── Main content ─────────────────────────────────────── -->
  <main class="main">
    <!-- Visualize -->
    <div class="content" id="content-viz">
      <div class="grid-area" id="grid-area">
        <canvas id="grid-canvas"></canvas>
      </div>
      <div class="tree-area hidden" id="tree-area">
        <div class="tree-hdr">
          <span id="tree-info">Exploration tree</span>
          <span id="tree-hint">Scroll=zoom  Drag=pan</span>
        </div>
        <canvas id="tree-canvas"></canvas>
        <div class="tree-legend">
          <span class="leg"><span class="dot" style="background:#34C759"></span>Start</span>
          <span class="leg"><span class="dot" style="background:#FF3B30"></span>End</span>
          <span class="leg"><span class="dot" style="background:#FF9500"></span>Path</span>
          <span class="leg"><span class="dot" style="background:#AFC8F0"></span>Explored</span>
        </div>
      </div>
    </div>

    <!-- Race -->
    <div class="content hidden" id="content-race">
      <div class="race-panels" id="race-panels"></div>
      <div class="race-charts hidden" id="race-charts">
        <canvas class="chart" id="chart-nodes"></canvas>
        <canvas class="chart" id="chart-path"></canvas>
        <canvas class="chart" id="chart-cost"></canvas>
        <canvas class="chart" id="chart-time"></canvas>
      </div>
    </div>
  </main>

  <script>
    const ALG_NAMES = {{ algo_names | tojson }};
    const ALG_FULL  = {{ algo_full  | tojson }};
  </script>
  <script src="/static/js/app.js"></script>
</body>
</html>
